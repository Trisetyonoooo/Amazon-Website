<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Headband top -->
  <path d="M 60 60 Q 100 30 140 60" stroke="#2c3e50" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Left ear cup support -->
  <line x1="60" y1="60" x2="60" y2="110" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right ear cup support -->
  <line x1="140" y1="60" x2="140" y2="110" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Left ear cup (outer) -->
  <circle cx="60" cy="120" r="22" fill="#34495e"/>
  
  <!-- Left ear cup (speaker) -->
  <circle cx="60" cy="120" r="16" fill="#7f8c8d"/>
  
  <!-- Left speaker detail -->
  <circle cx="60" cy="120" r="14" fill="#95a5a6" opacity="0.7"/>
  
  <!-- Speaker waves -->
  <circle cx="60" cy="120" r="8" fill="none" stroke="#FF9900" stroke-width="1" opacity="0.6"/>
  <circle cx="60" cy="120" r="10" fill="none" stroke="#FF9900" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Right ear cup (outer) -->
  <circle cx="140" cy="120" r="22" fill="#34495e"/>
  
  <!-- Right ear cup (speaker) -->
  <circle cx="140" cy="120" r="16" fill="#7f8c8d"/>
  
  <!-- Right speaker detail -->
  <circle cx="140" cy="120" r="14" fill="#95a5a6" opacity="0.7"/>
  
  <!-- Speaker waves -->
  <circle cx="140" cy="120" r="8" fill="none" stroke="#FF9900" stroke-width="1" opacity="0.6"/>
  <circle cx="140" cy="120" r="10" fill="none" stroke="#FF9900" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Mic boom (left side) -->
  <path d="M 55 125 Q 45 135 40 145" stroke="#2c3e50" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Mic tip -->
  <circle cx="40" cy="145" r="4" fill="#2c3e50"/>
  
  <!-- Center connector with audio icon -->
  <circle cx="100" cy="60" r="6" fill="#FF9900"/>
  <text x="100" y="65" text-anchor="middle" font-size="10" fill="white" font-weight="bold">♫</text>
</svg>
