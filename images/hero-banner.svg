<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFB84D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#heroBg)"/>
  
  <!-- Left side - Text area with wave effect -->
  <path d="M 0 0 Q 50 50 100 100 L 100 300 L 0 300 Z" fill="rgba(255, 255, 255, 0.1)"/>
  
  <!-- Main text -->
  <text x="100" y="100" font-size="48" font-weight="bold" fill="white" font-family="Arial, sans-serif">
    Belanja Pintar
  </text>
  <text x="100" y="160" font-size="36" fill="white" font-family="Arial, sans-serif">
    Hemat Lebih Banyak
  </text>
  <text x="100" y="210" font-size="20" fill="white" opacity="0.9" font-family="Arial, sans-serif">
    Diskon hingga 50% untuk ribuan produk pilihan
  </text>
  
  <!-- CTA Button -->
  <rect x="100" y="240" width="200" height="45" fill="white" rx="5"/>
  <text x="200" y="272" text-anchor="middle" font-size="18" font-weight="bold" fill="#FF9900">
    Belanja Sekarang
  </text>
  
  <!-- Right side - Animated products -->
  <g transform="translate(700, 50)">
    <!-- Laptop icon -->
    <rect x="0" y="0" width="100" height="60" rx="3" fill="rgba(255, 255, 255, 0.2)" stroke="white" stroke-width="2"/>
    <rect x="5" y="5" width="90" height="40" fill="rgba(255, 255, 255, 0.3)"/>
    <rect x="0" y="60" width="100" height="8" fill="rgba(255, 255, 255, 0.2)"/>
    <text x="50" y="55" text-anchor="middle" font-size="24" fill="white">💻</text>
  </g>
  
  <g transform="translate(850, 80)">
    <!-- Phone icon -->
    <rect x="0" y="0" width="70" height="110" rx="4" fill="rgba(255, 255, 255, 0.2)" stroke="white" stroke-width="2"/>
    <rect x="5" y="5" width="60" height="85" fill="rgba(255, 255, 255, 0.3)"/>
    <text x="35" y="60" text-anchor="middle" font-size="24" fill="white">📱</text>
  </g>
  
  <g transform="translate(950, 50)">
    <!-- Headphone icon -->
    <text x="30" y="80" text-anchor="middle" font-size="60" fill="white">🎧</text>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="250" r="3" fill="white" opacity="0.6"/>
  <circle cx="220" cy="250" r="3" fill="white" opacity="0.6"/>
  <circle cx="240" cy="250" r="3" fill="white" opacity="0.6"/>
  
  <!-- Offer badge -->
  <circle cx="1100" cy="80" r="50" fill="white" opacity="0.95"/>
  <text x="1100" y="75" text-anchor="middle" font-size="24" font-weight="bold" fill="#FF9900">
    50%
  </text>
  <text x="1100" y="95" text-anchor="middle" font-size="14" fill="#FF9900" font-weight="bold">
    OFF
  </text>
</svg>
