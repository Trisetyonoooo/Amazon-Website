<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Watch band top -->
  <rect x="85" y="15" width="30" height="25" rx="2" fill="#1a1a1a"/>
  
  <!-- Watch case -->
  <rect x="60" y="40" width="80" height="80" rx="8" fill="#2c3e50"/>
  
  <!-- Watch case highlight -->
  <rect x="62" y="42" width="76" height="76" rx="7" fill="none" stroke="#444" stroke-width="1"/>
  
  <!-- Watch screen -->
  <rect x="70" y="50" width="60" height="60" rx="5" fill="#1a1a1a"/>
  
  <!-- Screen display -->
  <rect x="72" y="52" width="56" height="56" fill="#00aa00"/>
  
  <!-- Time display -->
  <text x="100" y="75" text-anchor="middle" font-size="20" fill="white" font-weight="bold">10:45</text>
  
  <!-- Heart rate icon -->
  <text x="100" y="95" text-anchor="middle" font-size="14" fill="#FF0000">♥ 72</text>
  
  <!-- Status indicators -->
  <circle cx="75" cy="57" r="2" fill="#FF9900"/>
  <circle cx="125" cy="57" r="2" fill="#FF9900"/>
  
  <!-- Watch band bottom -->
  <rect x="85" y="120" width="30" height="25" rx="2" fill="#1a1a1a"/>
  
  <!-- Button right side (crown) -->
  <circle cx="143" cy="80" r="4" fill="#888"/>
  <circle cx="143" cy="80" r="3" fill="#666"/>
  
  <!-- Watch face details -->
  <circle cx="100" cy="80" r="1" fill="#666"/>
  <circle cx="100" cy="85" r="1" fill="#666"/>
  
  <!-- Fitness icon -->
  <text x="85" y="103" font-size="8" fill="#00aa00">●●●●●</text>
</svg>
