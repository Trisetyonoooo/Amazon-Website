<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Phone body -->
  <rect x="45" y="20" width="110" height="160" rx="12" fill="#1a1a1a"/>
  
  <!-- Phone border highlight -->
  <rect x="47" y="22" width="106" height="156" rx="11" fill="none" stroke="#333" stroke-width="1"/>
  
  <!-- Notch -->
  <rect x="75" y="22" width="50" height="18" rx="0" fill="#0a0a0a"/>
  
  <!-- Screen -->
  <rect x="50" y="40" width="100" height="130" fill="#00d4ff"/>
  
  <!-- Screen content - gradient wave -->
  <defs>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0099ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="50" y="40" width="100" height="130" fill="url(#screenGradient)"/>
  
  <!-- App icons on screen -->
  <rect x="60" y="55" width="15" height="15" fill="#FF6B6B" rx="3"/>
  <rect x="80" y="55" width="15" height="15" fill="#4ECDC4" rx="3"/>
  <rect x="100" y="55" width="15" height="15" fill="#FFE66D" rx="3"/>
  <rect x="120" y="55" width="15" height="15" fill="#95E1D3" rx="3"/>
  
  <!-- Home indicator (bottom bar) -->
  <rect x="60" y="158" width="80" height="3" fill="#333" rx="2"/>
  
  <!-- Camera notch detail -->
  <circle cx="90" cy="28" r="3" fill="#1a1a1a"/>
  <circle cx="105" cy="28" r="2" fill="#333"/>
</svg>
