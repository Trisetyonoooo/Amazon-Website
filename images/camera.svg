<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Camera body -->
  <rect x="40" y="50" width="120" height="80" rx="5" fill="#34495e"/>
  
  <!-- Top plate -->
  <rect x="40" y="48" width="120" height="8" fill="#2c3e50"/>
  
  <!-- Flash -->
  <rect x="50" y="55" width="20" height="15" fill="#FFD700" rx="2"/>
  <text x="60" y="66" text-anchor="middle" font-size="10" fill="black" font-weight="bold">⚡</text>
  
  <!-- Viewfinder -->
  <rect x="100" y="55" width="25" height="15" fill="#1a1a1a" rx="2"/>
  
  <!-- Main lens -->
  <circle cx="100" cy="95" r="30" fill="#1a1a1a"/>
  
  <!-- Lens glass outer -->
  <circle cx="100" cy="95" r="28" fill="#2c3e50"/>
  
  <!-- Lens glass middle -->
  <circle cx="100" cy="95" r="24" fill="#34495e"/>
  
  <!-- Lens glass inner -->
  <circle cx="100" cy="95" r="20" fill="#1a1a1a" opacity="0.8"/>
  
  <!-- Lens reflection -->
  <circle cx="95" cy="90" r="6" fill="#555" opacity="0.4"/>
  
  <!-- Aperture blades (interior lens detail) -->
  <line x1="100" y1="75" x2="100" y2="115" stroke="#444" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="95" x2="120" y2="95" stroke="#444" stroke-width="1" opacity="0.5"/>
  
  <!-- Shutter button -->
  <circle cx="55" cy="60" r="6" fill="#666"/>
  <circle cx="55" cy="60" r="4" fill="#888"/>
  
  <!-- Mode dial -->
  <circle cx="145" cy="70" r="8" fill="#555"/>
  <line x1="145" y1="63" x2="145" y2="60" stroke="#FF9900" stroke-width="1.5"/>
  
  <!-- Textured grip -->
  <rect x="38" y="80" width="4" height="30" fill="#555" opacity="0.6"/>
  <rect x="38" y="85" width="4" height="2" fill="#444"/>
  <rect x="38" y="92" width="4" height="2" fill="#444"/>
  <rect x="38" y="99" width="4" height="2" fill="#444"/>
  
  <!-- Focus ring markings -->
  <circle cx="100" cy="95" r="22" fill="none" stroke="#666" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>
</svg>
